{{ if .Params.charts }}
<script>window.__chartJsReady = new Promise(function (resolve) { window.__resolveChartJsReady = resolve; });</script>
<script defer src="https://cdn.jsdelivr.net/npm/hammerjs@2/hammer.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2/dist/chartjs-plugin-zoom.min.js"></script>
<script defer>
  if (window.ChartZoom) { Chart.register(ChartZoom); }
  window.__resolveChartJsReady();
</script>
{{ end }}
{{ if or .Params.math site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
        ]
    });"></script>
{{ end }}
