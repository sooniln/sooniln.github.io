baseURL = 'https://sooniln.github.io/'
locale = 'en-us'
title = 'Soonil Nagarkar'
theme = 'PaperMod'
paginate = 10

[params]
  author = "Soonil Nagarkar"
  description = "Staff Software Engineer"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true

[params.homeInfoParams]
  Title = "Soonil Nagarkar"
  Content = "Staff software engineer with a decade of experience at Google, specializing in systems engineering and low-level performance work. Technical interests center on the intersection of algorithms and hardware reality — cache-aware data structure design, operating system internals, and performance-critical implementations where the gap between theoretical and practical efficiency actually matters."

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/sooniln/"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/sooniln"

[markup.goldmark.extensions.passthrough]
  enable = true
  [markup.goldmark.extensions.passthrough.delimiters]
    block = [['$$', '$$']]
    inline = [['$', '$']]

[caches]
  [caches.images]
    dir = ':cacheDir/images'
